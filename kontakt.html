    <section class="hero">
        <div class="hero-text">
            <h1>Kontakt</h1>
            <p>Masz pytania lub chcesz nawiązać współpracę? Napisz do mnie!</p>
        </div>
    </section>
    <section class="contact-section">
        <h2>Formularz kontaktowy</h2>
        <p>Wypełnij formularz poniżej, postaram się odpowiedzieć na Twoją wiadomość jak najszybciej.</p>
        
        <form class="contact-form">
            <input type="text" name="name" placeholder="Imię i nazwisko">
            <input type="email" name="email" placeholder="Adres e-mail">
            <select name="subject">
                <option value="">Temat wiadomości</option>
                <option value="wspolpraca">Współpraca</option>
                <option value="pytanie">Pytanie</option>
                <option value="inne">Inne</option>
            </select>
            <textarea name="message" rows="6" placeholder="Twoja wiadomość"></textarea>
            <button type="submit">Wyślij wiadomość</button>
        </form>
    </section>
